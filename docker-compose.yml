services:
  db:
    image: postgres:15
    networks:
    - new-control-finance
    env_file:
      - .env
    ports:
      - "5432:5432"
    volumes:
      - new_control_finance_postgres_data:/var/lib/postgresql/data


  backend:
    image: node:20
    working_dir: /usr/src/app
    user: "${UID}:${GID}"
    ports:
      - "3000:3000"
      - "5555:5555"
    env_file:
      - .env
    volumes:
      - ./backend:/usr/src/app
    depends_on:
      - db
    networks:
      - new-control-finance
    command: sh -c "npm ci && npm run start:dev"

  frontend:
    image: node:20 # Теперь используем Node.js 20
    working_dir: /usr/src/app
    user: "${UID}:${GID}"
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/usr/src/app # Монтируем фронтенд в контейнер
    environment:
      - NODE_ENV=development
      - VITE_RECAPTCHA_SITE_KEY=${VITE_RECAPTCHA_SITE_KEY}
    command: /bin/bash -c "npm ci && npm run dev"
    networks:
      - new-control-finance # Сеть для взаимодействия с другими контейнерами

volumes:
  new_control_finance_postgres_data:
    driver: local

networks:
  new-control-finance:
    driver: bridge
